<!DOCTYPE html>
<html>
<head>
    <title>Signup Form</title>
</head>
<body>

<h1>Signup Form</h1>

<form>
    <table cellpadding="8">

        <tr>
            <td>Full Name:</td>
        </tr>
        <tr>
            <td><input type="text" placeholder="Enter your name"></td>
        </tr>

        <tr>
            <td>Email:</td>
        </tr>
        <tr>
            <td><input type="email" placeholder="Enter your email"></td>
        </tr>

        <tr>
            <td>Password:</td>
        </tr>
        <tr>
            <td><input type="password" placeholder="Enter password"></td>
        </tr>

        <tr>
            <td>Gender:</td>
        </tr>
        <tr>
            <td>
                <input type="radio" name="gender"> Male <br>
                <input type="radio" name="gender"> Female
            </td>
        </tr>

        <tr>
            <td>Hobbies:</td>
        </tr>
        <tr>
            <td>
                <input type="checkbox"> Reading <br>
                <input type="checkbox"> Sports <br>
                <input type="checkbox"> Music
            </td>
        </tr>

        <tr>
            <td>Country:</td>
        </tr>
        <tr>
            <td>
                <select>
                    <option>India</option>
                    <option>USA</option>
                    <option>UK</option>
                </select>
            </td>
        </tr>

        <tr>
            <td>Address:</td>
        </tr>
        <tr>
            <td><textarea rows="4" cols="40"></textarea></td>
        </tr>

        <tr>
            <td>
                <input type="submit" value="Sign Up">
            </td>
        </tr>

    </table>
</form>

</body>
</html>
