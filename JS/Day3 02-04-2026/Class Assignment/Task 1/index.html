<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capgemini Navbar</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #0A1F44;
            padding: 10px 40px;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .logo {
            width: 100px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
            font-weight: bold;
            font-size: 18px;
        }

        .logo img {
            width: 100%;
            height: 40px;
        }

        .nav-left a {
            color: white;
            text-decoration: none;
            margin-right: 15px;
            margin-left: 30px;
        }

        .nav-center {
            display: flex;
            margin-left: 50px;
        }

        .nav-center input {
            width: 250px;
            border: none;
            outline: none;
        }

        .nav-center button {
            padding: 6px 10px;
            border: none;
            background-color: #00AEEF;
            cursor: pointer;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 30px;
            margin-right: 25px;
        }

        .nav-right img {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            padding-right: 25px;
        }

        .nav-right a {
            color: white;
            text-decoration: none;
        }

        @media screen and (max-width: 700px) {
            .nav-center input {
                width: 120px;
            }
        }

        @media screen and (max-width : 500px){
            .nav-center {
                display: none !important;
            }     
        }
    </style>
</head>
<body>

    <div class="navbar">

        <div class="nav-left">
            <div class="logo">
                <img src="https://www.drupal.org/files/Capgemini_Logo_2COL_RGB.png">
            </div>
            <a href="#">Home</a>
            <a href="#">Contact</a>
        </div>

        <div class="nav-center">
            <input type="text" placeholder="Search...">
            <button>🔍</button>
        </div>

        <div class="nav-right">
            <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
            <a href="#">Logout</a>
        </div>

    </div>

</body>
</html>
