<!DOCTYPE html>
<html>
<head>
    <title>Text Properties Example</title>
    <style>
        p1 {
            text-align: center;
            color: red;
            word-spacing: 10px;
            letter-spacing: 2px;
            line-height: 1.8;
            text-transform: uppercase;
            text-decoration: underline;
            text-indent: 40px;
        }
        p2 {
            font-family: Arial;
            font-size: 18px;
            font-style: italic;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <p1>
        This is a sample paragraph to demonstrate CSS text properties.
    </p1><br><br>
    <p2>This is a font Styling Example</p2>


</body>
</html>
