<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple Selectors</title>

    <style>
        /* Universal Selector */
        * {
            font-family: Arial;
        }

        /* Element Selector */
        h1 {
            color: blue;
        }

        /* ID Selector */
        #heading {
            background-color: yellow;
        }

        /* Class Selector */
        .box {
            border: 2px solid black;
            padding: 10px;
        }

        /* Group Selector */
        h2, p {
            color: green;
        }
    </style>
</head>

<body>

    <h1 id="heading">Welcome to CSS</h1>

    <h2>This is heading 2</h2>

    <p>This is a paragraph.</p>

    <div class="box">
        This is a div with class selector.
    </div>

</body>
</html>
