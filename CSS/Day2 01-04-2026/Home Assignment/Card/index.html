<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
    
    
    <div class="image-wrapper">
        <img src="https://randomuser.me/api/portraits/men/32.jpg" alt="profile">
    </div>
    <h2>Some Name</h2>

    
    <p class="description">
        Senior Software Architect with a passion for building scalable,
        high-performance systems and mentoring the next generation of developers.
    </p>

    <hr>

    <div class="stats">
        <div>
            <h3>12+</h3>
            <p>YEARS XP</p>
        </div>
        <div>
            <h3>45</h3>
            <p>PROJECTS</p>
        </div>
        <div>
            <h3>3.2k</h3>
            <p>STARS</p>
        </div>
    </div>

</div>

</body>
</html>
