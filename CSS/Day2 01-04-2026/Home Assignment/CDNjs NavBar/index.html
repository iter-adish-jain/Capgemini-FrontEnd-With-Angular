<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Navbar</title>

<!-- Font Awesome for icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">

    <!-- LEFT SIDE -->
    <div class="left">
        <div class="logo">
            <span class="bracket">&lt;</span>
            <span class="cdn">cdn</span><span class="js">js</span>
            <span class="bracket">&gt;</span>
        </div>

        <div class="icons">
            <i class="fab fa-twitter"></i>
            <i class="fas fa-comment"></i>
        </div>
    </div>

    <!-- RIGHT SIDE -->
    <ul class="menu">
        <li>About</li>
        <li>Libraries</li>
        <li>API</li>
        <li>GitHub</li>
        <li>Status <span class="dot"></span></li>
    </ul>

</nav>

</body>
</html>
